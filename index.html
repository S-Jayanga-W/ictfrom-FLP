<!DOCTYPE html>
<html lang="si">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>ictfrom | Free Learn Pack (FLP)</title>

    <!-- Favicon -->
    <link rel="icon" type="image/png" href="ictfrom-FLP/logo.png">
</head>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ictfrom | Free Learn Pack (FLP) | Login</title>
<style>
  :root{
    --black:#0a0a0a;
    --black-2:#141414;
    --red:#e5121a;
    --red-dim:#7a0c11;
    --white:#f5f5f5;
    --grey:#8a8a8a;
  }
  *{box-sizing:border-box; margin:0; padding:0;}
  html,body{height:100%;}
  body{
    font-family:'Consolas','Courier New',monospace;
    background:var(--black);
    color:var(--white);
    overflow:hidden;
    position:relative;
  }

  /* layered animated background */
  .bg-layer{
    position:fixed; inset:0; z-index:0; overflow:hidden;
    background:
      radial-gradient(circle at 20% 20%, rgba(229,18,26,0.10), transparent 45%),
      radial-gradient(circle at 80% 75%, rgba(229,18,26,0.08), transparent 50%),
      var(--black);
  }

  #netCanvas{
    position:fixed; inset:0; z-index:0; display:block;
  }

  /* soft drifting glow orbs */
  .orb{
    position:fixed;
    border-radius:50%;
    filter:blur(60px);
    z-index:0;
    opacity:.55;
    animation:drift ease-in-out infinite alternate;
  }
  .orb.red{ background:radial-gradient(circle, rgba(229,18,26,0.55), transparent 70%); }
  .orb.white{ background:radial-gradient(circle, rgba(255,255,255,0.18), transparent 70%); }
  .orb1{ width:420px; height:420px; top:-10%; left:-8%; animation-duration:18s; }
  .orb2{ width:360px; height:360px; bottom:-12%; right:-6%; animation-duration:22s; animation-delay:2s; }
  .orb3{ width:260px; height:260px; top:40%; left:65%; animation-duration:16s; animation-delay:4s; }
  @keyframes drift{
    0%{ transform:translate(0,0) scale(1); }
    50%{ transform:translate(40px,-30px) scale(1.12); }
    100%{ transform:translate(-30px,25px) scale(0.95); }
  }

  /* red vertical light sweep */
  .sweep-beam{
    position:fixed; top:0; bottom:0; width:180px;
    background:linear-gradient(90deg, transparent, rgba(229,18,26,0.09), transparent);
    filter:blur(6px);
    animation:beamMove 9s ease-in-out infinite;
    z-index:0;
  }
  @keyframes beamMove{
    0%{ left:-15%; }
    50%{ left:85%; }
    100%{ left:-15%; }
  }

  /* scanning red hairline */
  .scanline{
    position:fixed; left:0; right:0; height:2px;
    background:linear-gradient(90deg, transparent, var(--red), transparent);
    box-shadow:0 0 20px 4px rgba(229,18,26,0.6);
    animation:scan 6s ease-in-out infinite;
    z-index:1; opacity:.6;
  }
  @keyframes scan{
    0%{top:0%;}
    50%{top:100%;}
    100%{top:0%;}
  }

  .wrap{
    position:relative; z-index:2;
    width:100%; height:100vh;
    display:flex; align-items:center; justify-content:center;
  }

  .card{
    width:400px;
    max-width:92vw;
    background:rgba(20,20,20,0.75);
    backdrop-filter:blur(14px);
    -webkit-backdrop-filter:blur(14px);
    border:1px solid rgba(229,18,26,0.35);
    border-radius:14px;
    padding:42px 36px 34px;
    box-shadow:0 0 40px rgba(229,18,26,0.15), 0 20px 60px rgba(0,0,0,0.6);
    position:relative;
    overflow:hidden;
    animation:cardIn .7s cubic-bezier(.2,.8,.2,1);
  }
  @keyframes cardIn{
    from{opacity:0; transform:translateY(30px) scale(.96);}
    to{opacity:1; transform:translateY(0) scale(1);}
  }
  .card::before{
    content:"";
    position:absolute; top:-2px; left:-2px; right:-2px; height:3px;
    background:linear-gradient(90deg, transparent, var(--red), transparent);
    animation:sweep 3s linear infinite;
  }
  @keyframes sweep{
    0%{transform:translateX(-100%);}
    100%{transform:translateX(100%);}
  }

  .brand{
    text-align:center;
    margin-bottom:6px;
  }
  .brand .tag{
    display:inline-block;
    font-size:11px;
    letter-spacing:3px;
    color:var(--red);
    border:1px solid var(--red-dim);
    padding:3px 10px;
    border-radius:20px;
    margin-bottom:14px;
    animation:pulseTag 2.4s ease-in-out infinite;
  }
  @keyframes pulseTag{
    0%,100%{box-shadow:0 0 0 rgba(229,18,26,0);}
    50%{box-shadow:0 0 12px rgba(229,18,26,0.5);}
  }
  h1{
    font-family:'Segoe UI', sans-serif;
    font-size:30px;
    font-weight:800;
    letter-spacing:1px;
    text-align:center;
    color:var(--white);
    text-transform:uppercase;
  }
  h1 span{color:var(--red);}
  .sub{
    text-align:center;
    color:var(--grey);
    font-size:12.5px;
    margin-top:6px;
    margin-bottom:28px;
    letter-spacing:.5px;
  }

  .field{
    position:relative;
    margin-bottom:18px;
  }
  .field input{
    width:100%;
    padding:14px 44px 14px 16px;
    background:rgba(255,255,255,0.03);
    border:1px solid rgba(255,255,255,0.12);
    border-radius:8px;
    color:var(--white);
    font-size:14px;
    outline:none;
    transition:border-color .25s, box-shadow .25s, background .25s;
    font-family:inherit;
  }
  .field input::placeholder{color:#666;}
  .field input:focus{
    border-color:var(--red);
    box-shadow:0 0 0 3px rgba(229,18,26,0.15);
    background:rgba(229,18,26,0.04);
  }
  .field .icon{
    position:absolute;
    right:14px; top:50%; transform:translateY(-50%);
    color:var(--grey);
    width:18px; height:18px;
    transition:color .25s;
    pointer-events:none;
  }
  .field input:focus ~ .icon{color:var(--red);}

  .field.code input{
    letter-spacing:1px;
    color:var(--red);
    font-weight:700;
  }
  .field .hint{
    font-size:10.5px;
    color:var(--grey);
    margin-top:6px;
    padding-left:2px;
    letter-spacing:.3px;
  }
  .field .err{
    font-size:11px;
    color:var(--red);
    margin-top:6px;
    padding-left:2px;
    display:none;
    animation:shakeErr .35s;
  }
  .field.invalid input{
    border-color:var(--red);
    animation:shakeErr .35s;
  }
  .field.invalid .err{display:block;}
  @keyframes shakeErr{
    0%,100%{transform:translateX(0);}
    25%{transform:translateX(-6px);}
    75%{transform:translateX(6px);}
  }

  .row{
    display:flex; align-items:center; justify-content:space-between;
    margin-bottom:24px;
    font-size:12.5px;
  }
  .remember{
    display:flex; align-items:center; gap:8px; color:var(--grey);
  }
  .remember input{accent-color:var(--red); width:14px; height:14px;}
  .row a{color:var(--red); text-decoration:none; transition:opacity .2s;}
  .row a:hover{opacity:.7; text-decoration:underline;}

  .btn{
    width:100%;
    padding:14px;
    border:none;
    border-radius:8px;
    background:var(--red);
    color:var(--white);
    font-size:14px;
    font-weight:700;
    letter-spacing:1px;
    text-transform:uppercase;
    cursor:pointer;
    position:relative;
    overflow:hidden;
    transition:transform .15s, box-shadow .25s, background .25s;
    font-family:inherit;
  }
  .btn:hover{
    background:#ff1b24;
    box-shadow:0 0 25px rgba(229,18,26,0.5);
  }
  .btn:active{transform:scale(.97);}
  .btn::after{
    content:"";
    position:absolute; top:0; left:-60%;
    width:40%; height:100%;
    background:linear-gradient(120deg, transparent, rgba(255,255,255,0.35), transparent);
    transform:skewX(-20deg);
    animation:shine 3.2s ease-in-out infinite;
  }
  @keyframes shine{
    0%{left:-60%;}
    50%{left:130%;}
    100%{left:130%;}
  }

  .switch{
    text-align:center;
    margin-top:22px;
    font-size:12.5px;
    color:var(--grey);
  }
  .switch b{
    color:var(--red);
    cursor:pointer;
    font-weight:700;
  }
  .switch b:hover{text-decoration:underline;}

  .toast{
    position:fixed;
    bottom:26px; left:50%;
    transform:translateX(-50%) translateY(20px);
    background:var(--black-2);
    border:1px solid var(--red);
    color:var(--white);
    padding:12px 22px;
    border-radius:8px;
    font-size:13px;
    opacity:0;
    pointer-events:none;
    transition:opacity .3s, transform .3s;
    z-index:10;
    box-shadow:0 8px 30px rgba(0,0,0,.5);
  }
  .toast.show{
    opacity:1;
    transform:translateX(-50%) translateY(0);
  }
  .toast.success{border-color:#2ecc71; color:#2ecc71;}

  .forms{position:relative;}
  .form-panel{
    animation:fadeSlide .4s ease;
  }
  @keyframes fadeSlide{
    from{opacity:0; transform:translateX(14px);}
    to{opacity:1; transform:translateX(0);}
  }
  .hidden{display:none;}

  @media (max-width:420px){
    .card{padding:32px 22px 26px;}
    h1{font-size:24px;}
  }
</style>
</head>
<body>

<div class="bg-layer"></div>
<canvas id="netCanvas"></canvas>
<div class="orb red orb1"></div>
<div class="orb white orb2"></div>
<div class="orb red orb3"></div>
<div class="sweep-beam"></div>
<div class="scanline"></div>

<div class="wrap">
  <div class="card">
    <div class="brand">
      <span class="tag">SECURE ACCESS</span>
      <h1 id="formTitle">LOG<span>IN</span></h1>
      <div class="sub" id="formSub">ictfrom | Free Learn Pack (FLP) &mdash; Enter your credentials to continue</div>
    </div>

    <div class="forms">

      <!-- LOGIN FORM -->
      <form id="loginForm" class="form-panel">
        <div class="field">
          <input type="text" placeholder="Username" id="loginUser" required>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.5c-3.3 0-9.8 1.6-9.8 4.9v2.4h19.6v-2.4c0-3.3-6.5-4.9-9.8-4.9z"/></svg>
        </div>
        <div class="field">
          <input type="password" placeholder="Password" id="loginPass" required>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 9V7a5 5 0 00-10 0v2a2 2 0 00-2 2v8a2 2 0 002 2h10a2 2 0 002-2v-8a2 2 0 00-2-2zm-8-2a3 3 0 016 0v2H9V7zm3 6a2 2 0 110 4 2 2 0 010-4z"/></svg>
        </div>
        <div class="row">
          <label class="remember"><input type="checkbox" checked> Remember me</label>
          <a href="#" onclick="return false;">Forgot Password?</a>
        </div>
        <button type="submit" class="btn">Login</button>
        <div class="switch">Don't have an account? <b id="toRegister">Register</b></div>
      </form>

      <!-- REGISTER FORM -->
      <form id="registerForm" class="form-panel hidden">
        <div class="field">
          <input type="text" placeholder="Full Name" id="regName" required>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 12c2.7 0 4.9-2.2 4.9-4.9S14.7 2.2 12 2.2 7.1 4.4 7.1 7.1 9.3 12 12 12zm0 2.5c-3.3 0-9.8 1.6-9.8 4.9v2.4h19.6v-2.4c0-3.3-6.5-4.9-9.8-4.9z"/></svg>
        </div>
        <div class="field">
          <input type="text" placeholder="Username" id="regUser" required>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M4 4h16v2H4zM4 11h16v2H4zM4 18h16v2H4z"/></svg>
        </div>
        <div class="field">
          <input type="password" placeholder="Password" id="regPass" required>
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M17 9V7a5 5 0 00-10 0v2a2 2 0 00-2 2v8a2 2 0 002 2h10a2 2 0 002-2v-8a2 2 0 00-2-2zm-8-2a3 3 0 016 0v2H9V7zm3 6a2 2 0 110 4 2 2 0 010-4z"/></svg>
        </div>
        <div class="field code" id="codeField">
          <input type="text" placeholder="Security Code" id="regCode" required autocomplete="off">
          <svg class="icon" viewBox="0 0 24 24" fill="currentColor"><path d="M12 1L3 5v6c0 5.5 3.8 10.7 9 12 5.2-1.3 9-6.5 9-12V5l-9-4zm-1 15l-4-4 1.4-1.4L11 13.2l5.6-5.6L18 9l-7 7z"/></svg>
          <div class="hint">Registration requires a valid security code</div>
          <div class="err">Invalid security code. Registration denied.</div>
        </div>
        <button type="submit" class="btn">Register</button>
        <div class="switch">Already have an account? <b id="toLogin">Login</b></div>
      </form>

    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script type="module">
  // =========================================================
  // FIREBASE SETUP
  // =========================================================
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-app.js";
  import {
    getAuth,
    createUserWithEmailAndPassword,
    signInWithEmailAndPassword
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-auth.js";
  import {
    getDatabase,
    ref,
    set,
    get,
    query,
    orderByChild,
    equalTo
  } from "https://www.gstatic.com/firebasejs/12.15.0/firebase-database.js";

  const firebaseConfig = {
    apiKey: "AIzaSyCagFTgiAReVNf8PxNppg01URkQRPoNw3A",
    authDomain: "ictfrom-free-learn-pack.firebaseapp.com",
    databaseURL: "https://ictfrom-free-learn-pack-default-rtdb.firebaseio.com",
    projectId: "ictfrom-free-learn-pack",
    storageBucket: "ictfrom-free-learn-pack.firebasestorage.app",
    messagingSenderId: "621015284854",
    appId: "1:621015284854:web:850148451720ff2529b357",
    measurementId: "G-7MPX23W72F"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);
  const db = getDatabase(app);

  // Firebase Auth needs an email, but our form only asks for a
  // username — so we turn the username into a fake internal email.
  function usernameToEmail(username){
    return username.toLowerCase().replace(/[^a-z0-9._-]/g, '') + '@ictsite.local';
  }

  // ---- network background (canvas: red/white nodes on black) ----
  (function(){
    const canvas = document.getElementById('netCanvas');
    const ctx = canvas.getContext('2d');
    let w, h, nodes;
    const NODE_COUNT = 70;
    const LINK_DIST = 140;
    const mouse = { x:null, y:null };

    function resize(){
      w = canvas.width = window.innerWidth;
      h = canvas.height = window.innerHeight;
    }
    window.addEventListener('resize', resize);
    resize();

    function makeNodes(){
      nodes = [];
      for(let i=0;i<NODE_COUNT;i++){
        const isRed = Math.random() < 0.4;
        nodes.push({
          x: Math.random()*w,
          y: Math.random()*h,
          vx: (Math.random()-0.5)*0.35,
          vy: (Math.random()-0.5)*0.35,
          r: isRed ? Math.random()*2+1.4 : Math.random()*1.6+0.8,
          color: isRed ? '229,18,26' : '245,245,245'
        });
      }
    }
    makeNodes();

    window.addEventListener('mousemove', e=>{
      mouse.x = e.clientX; mouse.y = e.clientY;
    });
    window.addEventListener('mouseleave', ()=>{ mouse.x=null; mouse.y=null; });

    function step(){
      ctx.clearRect(0,0,w,h);

      // update + draw nodes
      for(const n of nodes){
        n.x += n.vx; n.y += n.vy;
        if(n.x < 0 || n.x > w) n.vx *= -1;
        if(n.y < 0 || n.y > h) n.vy *= -1;

        ctx.beginPath();
        ctx.arc(n.x, n.y, n.r, 0, Math.PI*2);
        ctx.fillStyle = `rgba(${n.color},0.85)`;
        ctx.shadowColor = `rgba(${n.color},0.8)`;
        ctx.shadowBlur = 6;
        ctx.fill();
      }
      ctx.shadowBlur = 0;

      // draw links
      for(let i=0;i<nodes.length;i++){
        for(let j=i+1;j<nodes.length;j++){
          const a = nodes[i], b = nodes[j];
          const dx = a.x-b.x, dy = a.y-b.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if(dist < LINK_DIST){
            const alpha = (1 - dist/LINK_DIST) * 0.35;
            ctx.beginPath();
            ctx.moveTo(a.x, a.y);
            ctx.lineTo(b.x, b.y);
            ctx.strokeStyle = `rgba(229,18,26,${alpha})`;
            ctx.lineWidth = 0.7;
            ctx.stroke();
          }
        }
        // link to mouse
        if(mouse.x !== null){
          const dx = nodes[i].x-mouse.x, dy = nodes[i].y-mouse.y;
          const dist = Math.sqrt(dx*dx+dy*dy);
          if(dist < 160){
            const alpha = (1 - dist/160) * 0.6;
            ctx.beginPath();
            ctx.moveTo(nodes[i].x, nodes[i].y);
            ctx.lineTo(mouse.x, mouse.y);
            ctx.strokeStyle = `rgba(245,245,245,${alpha})`;
            ctx.lineWidth = 0.8;
            ctx.stroke();
          }
        }
      }

      requestAnimationFrame(step);
    }
    step();
  })();

  // ---- form switching ----
  const loginForm = document.getElementById('loginForm');
  const registerForm = document.getElementById('registerForm');
  const formTitle = document.getElementById('formTitle');
  const formSub = document.getElementById('formSub');

  document.getElementById('toRegister').onclick = () => {
    loginForm.classList.add('hidden');
    registerForm.classList.remove('hidden');
    registerForm.style.animation='none'; void registerForm.offsetWidth; registerForm.style.animation='fadeSlide .4s ease';
    formTitle.innerHTML = 'REG<span>ISTER</span>';
    formSub.textContent = 'ictfrom | Free Learn Pack (FLP) | Registration requires a valid security code';
  };
  document.getElementById('toLogin').onclick = () => {
    registerForm.classList.add('hidden');
    loginForm.classList.remove('hidden');
    loginForm.style.animation='none'; void loginForm.offsetWidth; loginForm.style.animation='fadeSlide .4s ease';
    formTitle.innerHTML = 'LOG<span>IN</span>';
    formSub.textContent = 'ICT Site — Enter your credentials to continue';
  };

  // ---- toast ----
  const toast = document.getElementById('toast');
  function showToast(msg, ok){
    toast.textContent = msg;
    toast.className = 'toast show' + (ok ? ' success':'');
    setTimeout(()=>{ toast.className='toast'; }, 2800);
  }

  // =========================================================
  // AUTH (Firebase — real database, works from any device)
  // =========================================================
  const REDIRECT_PAGE = 'dashboard.html'; // <-- change this to your page name

  // ---- login submit ----
  loginForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const u = document.getElementById('loginUser').value.trim();
    const p = document.getElementById('loginPass').value;

    if(!u || !p){ showToast('Please enter username and password', false); return; }

    try{
      const email = usernameToEmail(u);
      await signInWithEmailAndPassword(auth, email, p);
      showToast('Login successful. Welcome back!', true);
      setTimeout(()=>{ window.location.href = REDIRECT_PAGE; }, 1000);
    }catch(err){
      showToast('Invalid username or password', false);
    }
  });

  // ---- register submit with security code check ----
  const VALID_CODE = 'S.JAYANGA_IT.NOW';
  const codeField = document.getElementById('codeField');
  const codeInput = document.getElementById('regCode');

  registerForm.addEventListener('submit', async e=>{
    e.preventDefault();
    const code = codeInput.value.trim();

    if(code !== VALID_CODE){
      codeField.classList.add('invalid');
      codeInput.focus();
      showToast('Invalid security code — registration denied', false);
      setTimeout(()=>codeField.classList.remove('invalid'), 500);
      return;
    }
    codeField.classList.remove('invalid');

    const name = document.getElementById('regName').value.trim();
    const username = document.getElementById('regUser').value.trim();
    const password = document.getElementById('regPass').value;

    if(!name || !username || !password){
      showToast('Please fill in all fields', false);
      return;
    }
    if(password.length < 6){
      showToast('Password must be at least 6 characters', false);
      return;
    }

    try{
      // check username uniqueness in Realtime Database
      const q = query(ref(db, 'users'), orderByChild('username'), equalTo(username));
      const snap = await get(q);
      if(snap.exists()){
        showToast('That username is already taken', false);
        return;
      }

      const email = usernameToEmail(username);
      const cred = await createUserWithEmailAndPassword(auth, email, password);
      await set(ref(db, 'users/' + cred.user.uid), { name, username });

      showToast('Account created for '+ name +'! You can log in now.', true);
      registerForm.reset();
      setTimeout(()=>{ document.getElementById('toLogin').click(); }, 1400);
    }catch(err){
      showToast(err.message.replace('Firebase: ',''), false);
    }
  });

  codeInput.addEventListener('input', ()=> codeField.classList.remove('invalid'));
</script>

</body>
</html>
